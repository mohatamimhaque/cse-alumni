<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUET Reunion 2025 — Member Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
<link rel="preload" href="assests/profiles.json" as="fetch" type="application/json">
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --card:     #1c2230;
    --border:   #2a3245;
    --gold:     #c9a84c;
    --gold-dim: #8a6e2f;
    --gold-light: #e8c96a;
    --text:     #e8eaf0;
    --muted:    #7a8499;
    --accent:   #3a7bd5;
    --red:      #e05252;
    --cyan:     #4fd1ff;
    --emerald:  #32d399;
    --glass:    rgba(13,31,71,.52);
    --card-photo-h: 210px;
    --id-photo-w: 108px;
    --id-photo-h: 132px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #1a2235 60%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 22px 36px 18px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }
  .header-brand h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--gold); letter-spacing: .02em; }
  .header-brand p { font-size: .72rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-top: 2px; }
  .header-divider { width: 1px; height: 36px; background: var(--border); flex: 0 0 auto; }
  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #searchInput {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px 10px 38px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .9rem; outline: none; transition: border-color .2s;
  }
  #searchInput:focus { border-color: var(--gold-dim); }
  #searchInput::placeholder { color: var(--muted); }
  .stats { flex: 0 0 auto; text-align: right; }
  .stats span { font-size: 1.5rem; font-weight: 600; color: var(--gold); font-family: 'Playfair Display', serif; display: block; line-height: 1; }
  .stats small { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }

  /* ── Filter Bars ── */
  .filter-section { background: var(--bg); border-bottom: 1px solid var(--border); }
  .filter-row { padding: 10px 36px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid rgba(42,50,69,.5); }
  .filter-row:last-child { border-bottom: none; }
  .filter-label { font-size: .68rem; color: var(--gold-dim); text-transform: uppercase; letter-spacing: .12em; font-weight: 600; margin-right: 4px; white-space: nowrap; }
  .chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: .75rem; color: var(--muted); cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
  .chip:hover { border-color: var(--gold-dim); color: var(--text); }
  .chip.active { background: var(--gold); border-color: var(--gold); color: #0d1117; font-weight: 600; }
  .chip.series-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .org-select {
    min-width: min(520px, 100%);
    max-width: 100%;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .84rem;
    outline: none;
  }
  .org-select:focus { border-color: var(--gold-dim); }

  /* ── Grid ── */
  .grid-container { padding: 28px 36px; display: grid; grid-template-columns: repeat(auto-fill, minmax(245px, 1fr)); gap: 18px; }

  /* ── Card ── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform .22s, box-shadow .22s, border-color .22s; animation: fadeUp .3s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,.45), 0 0 0 1px var(--gold-dim); border-color: var(--gold-dim); }
  .card-photo { width: 100%; height: var(--card-photo-h); object-fit: cover; object-position: center top; display: block; background: var(--surface); }
  .card-photo-placeholder { width: 100%; height: var(--card-photo-h); background: linear-gradient(135deg, var(--surface), var(--border)); display: flex; align-items: center; justify-content: center; font-size: 2.8rem; color: var(--border); }
  .card-body { padding: 14px; }
  .card-meta { display: flex; gap: 5px; margin-bottom: 7px; flex-wrap: wrap; }
  .badge { font-size: .64rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; letter-spacing: .05em; }
  .badge-id { background: rgba(201,168,76,.12); color: var(--gold); border: 1px solid var(--gold-dim); }
  .badge-series { background: rgba(58,123,213,.12); color: var(--accent); border: 1px solid rgba(58,123,213,.3); }
  .badge-batch { background: rgba(22,223,140,.12); color: #5de0a3; border: 1px solid rgba(22,223,140,.32); }
  .badge-status { background: rgba(160,174,208,.14); color: #d3dcf0; border: 1px solid rgba(160,174,208,.3); }
  .card-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 7px; }
  .card-role { font-size: .78rem; color: var(--muted); line-height: 1.4; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 9px; border-top: 1px solid var(--border); }
  .blood-badge { font-size: .7rem; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: rgba(201,168,76,.12); color: var(--gold); border: 1px solid var(--gold-dim); }
  .view-btn { font-size: .73rem; color: var(--accent); font-weight: 500; display: flex; align-items: center; gap: 3px; }

  .skeleton-card { pointer-events: none; }
  .skeleton-photo,
  .skeleton-line,
  .skeleton-pill,
  .skeleton-chip {
    position: relative;
    overflow: hidden;
    background: linear-gradient(110deg, rgba(50,58,78,.6) 8%, rgba(92,104,132,.42) 18%, rgba(50,58,78,.6) 33%);
    background-size: 220% 100%;
    animation: shimmer 1.15s linear infinite;
  }
  .skeleton-photo { height: var(--card-photo-h); }
  .skeleton-meta { display: flex; gap: 6px; margin-bottom: 10px; }
  .skeleton-pill { height: 18px; width: 76px; border-radius: 999px; }
  .skeleton-line { height: 11px; border-radius: 7px; margin-bottom: 8px; }
  .skeleton-line.name { height: 14px; width: 72%; margin-bottom: 10px; }
  .skeleton-line.role { width: 90%; }
  .skeleton-line.role2 { width: 64%; margin-bottom: 0; }
  .skeleton-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; margin-top: 12px; border-top: 1px solid var(--border); }
  .skeleton-chip { height: 20px; width: 56px; border-radius: 999px; }
  .skeleton-chip.small { width: 84px; }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to { background-position: -20% 0; }
  }

  /* ── Pagination ── */
  .pagination-wrap { padding: 20px 36px 40px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
  .page-info { font-size: .78rem; color: var(--muted); text-align: center; width: 100%; margin-bottom: 4px; }
  .pg-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; min-width: 36px; font-size: .82rem; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; display: flex; align-items: center; justify-content: center; }
  .pg-btn:hover:not(:disabled) { border-color: var(--gold-dim); color: var(--text); }
  .pg-btn.active { background: var(--gold); border-color: var(--gold); color: #0d1117; font-weight: 700; }
  .pg-btn:disabled { opacity: .35; cursor: not-allowed; }
  .pg-ellipsis { color: var(--muted); font-size: .82rem; padding: 0 2px; }

  .page-footer {
    width:100%;
    padding: 10px 16px;
    border: none;
    border-radius: 0;
    background: transparent;
    box-shadow: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    color: #8fa3c8;
    font-size: clamp(.8rem, 1.8vw, .9rem);
    letter-spacing: .01em;
    text-align: center;
  }

  .page-footer-label {
    color: #93a7cb;
  }

  .page-footer-sep {
    color: rgba(141,162,201,.5);
  }

  .page-footer strong {
    color: var(--gold-light);
    font-weight: 600;
    text-shadow: 0 0 14px rgba(201,168,76,.12);
  }

  .page-footer-link {
    color: var(--gold-light);
    font-weight: 600;
    text-decoration: none;
    text-shadow: 0 0 14px rgba(201,168,76,.12);
  }

  .page-footer-link:hover {
    text-decoration: underline;
  }

  /* ── No results ── */
  .no-results { grid-column: 1/-1; text-align: center; padding: 70px 20px; color: var(--muted); }
  .no-results svg { opacity: .3; margin-bottom: 14px; }

  /* ══════════════════════════════════════════
     ── MODAL OVERLAY ──
  ══════════════════════════════════════════ */
  .modal-overlay { display: none; position: fixed; inset: 0; background: radial-gradient(circle at 20% 20%, rgba(29,59,120,.42), rgba(6,9,16,.9) 52%), rgba(6,9,16,.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-shell {
    width: 100%;
    max-width: 470px;
    display: grid;
    grid-template-columns: minmax(0, 360px) auto;
    align-items: center;
    justify-content: center;
    column-gap: 12px;
    animation: slideUp .28s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ══════════════════════════════════════════
     ── ID CARD ──
  ══════════════════════════════════════════ */
  .card-top-band {
    height: 8px;
    background: linear-gradient(90deg, #b9932f 0%, #e5c45b 50%, #b9932f 100%);
  }

  #idCard {
    width: min(360px, 100%);
    margin: 0 auto;
    min-height: 540px;
    display: flex;
    flex-direction: column;
    background: linear-gradient(162deg, #1d2f68 0%, #15295a 34%, #0a1a3a 68%, #08142f 100%);
    border-radius: 22px;
    border: 1px solid rgba(184,152,56,.35);
    box-shadow: 0 24px 72px rgba(2,7,20,.72), 0 0 0 1px rgba(79,209,255,.1) inset;
    position: relative;
    overflow: hidden;
  }

  #idCard::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
    background-size: 42px 42px;
    opacity: .5;
    pointer-events: none;
  }

  #idCard::after {
    content: '';
    position: absolute;
    width: 180px;
    height: 180px;
    right: -64px;
    top: -62px;
    background: radial-gradient(circle, rgba(79,209,255,.18) 0%, rgba(79,209,255,0) 70%);
    pointer-events: none;
  }

  .id-event-top {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 76px 1fr 76px;
    align-items: center;
    gap: 8px;
    padding: 16px 18px 8px;
  }

  .id-logo {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: none;
    object-fit: cover;
    display: block;
    background: #0d1e45;
    box-shadow: 0 8px 22px rgba(0,0,0,.35), 0 0 0 2px rgba(255,255,255,.14);
  }

  .id-logo-right {
    justify-self: end;
  }

  .id-event-title {
    text-align: center;
    padding-top: 0;
    max-width: 180px;
    justify-self: center;
  }

  .id-event-main {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: #edf3ff;
    letter-spacing: .01em;
    font-weight: 800;
    text-shadow: 0 2px 12px rgba(5,10,20,.45);
  }

  .id-event-main span {
    color: #e1bf52;
    background: linear-gradient(90deg, #f3da79, #cfa53a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
            background-clip: text;
  }

  .id-event-sub {
    margin-top: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: .68rem;
    letter-spacing: .03em;
    color: #8ea2cc;
    text-transform: none;
    font-weight: 500;
    line-height: 1.25;
  }

  .id-photo-stage {
    position: relative;
    z-index: 1;
    margin-top: 10px;
    display: flex;
    justify-content: center;
  }

  .id-photo-wrap {
    position: relative;
    width: 118px;
    height: 118px;
    border-radius: 50%;
    padding: 4px;
    border: 1px solid rgba(255,255,255,.26);
    box-shadow: 0 12px 28px rgba(4,10,26,.45), 0 0 0 1px rgba(79,209,255,.18) inset;
    background: linear-gradient(155deg, rgba(28,55,110,.9), rgba(17,34,76,.88));
    backdrop-filter: blur(3px);
  }

  .id-photo-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(160deg, rgba(255,255,255,.16), rgba(255,255,255,0) 32%);
    pointer-events: none;
  }

  #idCardPhoto {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.2);
    display: block;
    background: #1c2a3a;
  }

  .id-photo-placeholder {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.18);
    background: radial-gradient(circle at 40% 30%, #1a326f 0%, #10234f 70%, #0a1733 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2f4a87;
  }

  .id-name {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-top: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(.96rem, 3.2vw, 1.28rem);
    font-weight: 700;
    color: #f5f8ff;
    line-height: 1.12;
    padding: 0 28px;
    text-shadow: 0 2px 10px rgba(0,0,0,.32);
    letter-spacing: .005em;
  }

  .id-designation {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-top: 5px;
    font-size: .8rem;
    color: #a5b9df;
    padding: 0 28px;
  }

  .id-org-name {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-top: 2px;
    font-size: .76rem;
    color: #7f94be;
    min-height: 20px;
    padding: 0 28px;
  }

  .id-badges {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
    padding: 0 18px;
    align-items: center;
  }

  .id-badge {
    font-family: 'Rajdhani', sans-serif;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .09em;
    padding: 8px;
    border-radius: 7px;
    backdrop-filter: blur(3px);
    display: inline-flex;
    align-items: center;
    line-height: 1;
  }

  #idCard sup {
    font-size: .62em;
    line-height: 0;
    position: relative;
    top: -.45em;
    margin-left: 1px;
  }

  .id-badge-id {
    background: rgba(201,168,76,.18);
    color: #e8cf75;
    border: 1px solid rgba(201,168,76,.35);
  }

  .id-badge-series {
    background: rgba(58,123,213,.2);
    color: #7fb6ff;
    border: 1px solid rgba(58,123,213,.4);
  }

  .id-badge-batch {
    background: rgba(22,223,140,.14);
    color: #7be7b6;
    border: 1px solid rgba(22,223,140,.35);
  }

  .id-badge-status {
    background: rgba(160,174,208,.14);
    color: #d3dcf0;
    border: 1px solid rgba(160,174,208,.3);
  }

  .id-badge-blood {
    background: rgba(224,82,82,.14);
    color: #f08f8f;
    border: 1px solid rgba(224,82,82,.3);
  }

  .id-details-shell {
    position: relative;
    z-index: 1;
    margin: 11px 14px 12px;
    background: linear-gradient(160deg, rgba(14,34,75,.45), rgba(10,25,57,.44));
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 12px;
    backdrop-filter: blur(4px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 8px 22px rgba(5,10,22,.24);
  }

  .id-details {
    padding: 9px 10px;
    display: grid;
    gap: 5px;
  }

  .id-row {
    display: grid;
    grid-template-columns: 108px 1fr;
    align-items: center;
    gap: 7px;
    border-bottom: 1px solid rgba(255,255,255,.055);
    padding-bottom: 4px;
  }

  .id-row:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .id-row-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: .6rem;
    font-weight: 700;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #637ca9;
  }

  .id-row-value {
    font-size: .76rem;
    font-weight: 700;
    color: #dde8ff;
    line-height: 1.24;
    word-break: break-word;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .id-row-value.empty { color: #7086af; font-style: italic; }
  .id-row-value .empty { color: #7086af; font-style: italic; }
  .id-row-value a { color: #7fb6ff; text-decoration: none; }
  .id-row-value a:hover { text-decoration: underline; color: #9dccff; }

  .blood-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(224,82,82,.16);
    color: #f08f8f;
    border: 1px solid rgba(224,82,82,.3);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: .72rem;
  }

  .id-bottom-strip {
    position: relative;
    right: auto;
    bottom: auto;
    left: auto;
    z-index: 1;
    margin-top: auto;
    background: linear-gradient(90deg, rgba(8,18,44,.88), rgba(16,38,88,.82), rgba(8,18,44,.88));
    height: 44px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid rgba(185,158,75,.24);
  }

  .id-bottom-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: .55rem;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: #6480b0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
    width: 100%;
  }

  .id-series-mark {
    font-family: 'Rajdhani', sans-serif;
    font-size: .74rem;
    color: #e1c25a;
    letter-spacing: .08em;
    font-weight: 700;
    text-shadow: 0 1px 10px rgba(225,194,90,.2);
  }

  /* ── Modal action bar ── */
  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    justify-self: start;
    align-self: center;
    z-index: 3;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    width: 58px;
    height: 58px;
    border-radius: 16px;
    cursor: pointer;
    transition: all .18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border: none;
  }

  .btn .material-symbols-outlined {
    font-size: 22px;
    line-height: 1;
  }

  .btn .btn-text {
    font-size: .62rem;
    letter-spacing: .04em;
  }

  .btn-close {
    background: linear-gradient(180deg, rgba(32,40,60,.94), rgba(20,27,43,.95));
    border: 1px solid rgba(125,140,178,.3);
    color: #9fb2d9;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
  }

  .btn-close:hover { border-color: var(--red); color: var(--red); }

  /* ── Download button ── */
  .btn-download {
    background: linear-gradient(180deg, rgba(201,168,76,.22), rgba(138,110,47,.18));
    border: 1px solid rgba(201,168,76,.4);
    color: var(--gold-light);
    box-shadow: 0 8px 24px rgba(0,0,0,.25), 0 0 0 1px rgba(201,168,76,.08) inset;

  .btn-download:hover:not(:disabled) {

    color: #fff;
    box-shadow: 0 8px 28px rgba(201,168,76,.22), 0 0 0 1px rgba(201,168,76,.18) inset;

  }

  .btn-download:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  /* spinner inside download btn */
  .btn-download .dl-spinner {
    width: 18px;

  .btn-download.loading .dl-spinner { display: block; }
  .btn-download.loading .dl-icon,

  /* ── Loading ── */

  .spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }

  ::-webkit-scrollbar { width: 6px; }

  @media (max-width: 600px) {

</style>

<script>
  let allProfiles  = [];
  let allOrganizations = [];
  let activeSeries = 'all';
  let activeOrganization = 'all';
  let activeBlood  = 'all';
  let searchQuery  = '';
  let currentPage  = 1;
  const PER_PAGE   = 20;
  const SEARCH_DEBOUNCE_MS = 180;
  const PROFILE_CACHE_KEY = 'duet_reunion_profiles_cache_v1';
  const PROFILE_CACHE_TS_KEY = 'duet_reunion_profiles_cache_ts_v1';
  const PROFILE_CACHE_TTL_MS = 1000 * 60 * 60 * 12;
  let currentMemberName = '';
  let domToImageReady = null;
  let searchDebounceTimer = null;

  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const raw = s => String(s||'');

  function normalizePhotoPath(path) {
    if (!path) return '';
    let p = String(path).trim().replace(/\\/g, '/');
    const photosMatch = p.match(/(?:^|\/)(photos\/.*)$/i);
    if (photosMatch) return `assests/${photosMatch[1]}`;
    p = p.replace(/^reunion_output\//i, '');
    p = p.replace(/^\.\//, '');
    if (/^photos\//i.test(p)) return `assests/${p}`;
    if (/^assests\/photos\//i.test(p)) return p;
    return p;
  }

  function hydrateProfiles(list) {
    allProfiles = (Array.isArray(list) ? list : []).map((p, idx) => ({
      ...p,
      _idx: idx,
      photo: normalizePhotoPath(p.photo)
    }));
  }

  function readCachedProfiles() {
    try {
      const rawPayload = localStorage.getItem(PROFILE_CACHE_KEY);
      const rawTs = Number(localStorage.getItem(PROFILE_CACHE_TS_KEY) || 0);
      if (!rawPayload || !rawTs) return null;
      if (Date.now() - rawTs > PROFILE_CACHE_TTL_MS) return null;
      const parsed = JSON.parse(rawPayload);
      return Array.isArray(parsed) ? parsed : null;
    } catch (_) {
      return null;
    }
  }

  function writeCachedProfiles(list) {
    try {
      localStorage.setItem(PROFILE_CACHE_KEY, JSON.stringify(list));
      localStorage.setItem(PROFILE_CACHE_TS_KEY, String(Date.now()));
    } catch (_) {}
  }

  async function ensureDomToImage() {
    if (window.domtoimage) return window.domtoimage;
    if (domToImageReady) return domToImageReady;

    domToImageReady = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js';
      script.async = true;
      script.onload = () => resolve(window.domtoimage);
      script.onerror = () => reject(new Error('Failed to load image export library'));
      document.head.appendChild(script);
    });

    return domToImageReady;
  }

  function getSeries(id) {
    const m = String(id || '').trim().match(/^(\d{2})/);
    if (!m) return null;
    const n = Number(m[1]);
    return String(n).padStart(2, '0');
  }

  function toOrdinal(n) {
    const v = Number(n);
    if (!Number.isFinite(v) || v <= 0) return '';
    const j = v % 10;
    const k = v % 100;
    if (j === 1 && k !== 11) return `${v}st`;
    if (j === 2 && k !== 12) return `${v}nd`;
    if (j === 3 && k !== 13) return `${v}rd`;
    return `${v}th`;
  }

  function toOrdinalSupHtml(n) {
    const ord = toOrdinal(n);
    const m = ord.match(/^(\d+)(st|nd|rd|th)$/);
    if (!m) return esc(ord);
    return `${m[1]}<sup>${m[2]}</sup>`;
  }

  function formatSeriesHtml(series) {
    const rawSeries = String(series || '').trim();
    const n = Number(rawSeries);
    const seriesText = Number.isFinite(n) && n >= 0 ? String(Math.trunc(n)).padStart(2, '0') : rawSeries;
    return `${esc(seriesText)} Series`;
  }

  function getBatchNumberFromSeries(series) {
    if (!series) return null;
    const s = Number(series);
    if (!Number.isFinite(s)) return null;
    if (s < 0 || s > 99) return null;
    if(s>=19) return s;
    else if(s>=11) return s+1;
    return ((s - 99 + 100) % 100) + 1;
  }

  function getBatchCategory(batchNo) {
    const b = Number(batchNo);
    if (!Number.isFinite(b)) return '';
    if (b >= 1 && b <= 20) return 'Alumni';
    if (b >= 21 && b <= 22) return 'Student';
    return '';
  }

  function getTelHref(value) {
    const cleaned = String(value || '').replace(/[^\d+]/g, '');
    return cleaned ? `tel:${cleaned}` : '';
  }

  function getMailHref(value) {
    const email = String(value || '').trim();
    return email ? `mailto:${email}` : '';
  }

  function cleanDisplayValue(value) {
    const v = String(value || '').trim();
    if (!v) return '';
    if (/^[-_\u2014]+$/.test(v)) return '';
    if (/^(n\/?a|na|null|none)$/i.test(v)) return '';
    return v;
  }

  function renderGridSkeleton(count = 6) {
    const grid = document.getElementById('grid');
    const items = Array.from({ length: count }, () => `
      <div class="card skeleton-card">
        <div class="skeleton-photo"></div>
        <div class="card-body">
          <div class="skeleton-meta">
            <div class="skeleton-pill"></div>
            <div class="skeleton-pill"></div>
          </div>
          <div class="skeleton-line name"></div>
          <div class="skeleton-line role"></div>
          <div class="skeleton-line role2"></div>
          <div class="skeleton-footer">
            <div class="skeleton-chip"></div>
            <div class="skeleton-chip small"></div>
          </div>
        </div>
      </div>`).join('');
    grid.innerHTML = items;
    document.getElementById('paginationWrap').innerHTML = '';
  }

  // ── Load ──────────────────────────────────────────────────────────────────
  async function loadData() {
    try {
      renderGridSkeleton(6);
      let renderedFromCache = false;
      const cached = readCachedProfiles();
      if (cached && cached.length) {
        hydrateProfiles(cached);
        buildSeriesChips();
        buildOrganizationChips();
        renderGrid();
        renderedFromCache = true;
      }

      const candidates = ['assests/profiles.json', 'profiles.json'];
      let loaded = null;
      for (const url of candidates) {
        try {
          const res = await fetch(url);
          if (res.ok) {
            loaded = await res.json();
            break;
          }
        } catch (_) {}
      }
      if (!loaded && renderedFromCache) return;
      if (!loaded) throw new Error();

      writeCachedProfiles(loaded);
      hydrateProfiles(loaded);
      buildSeriesChips();
      buildOrganizationChips();
      renderGrid();
    } catch {
      document.getElementById('grid').innerHTML = `
        <div class="no-results">
          <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 9v3m0 4h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
          <p style="color:var(--red);font-weight:600;font-size:1rem">profiles.json not found</p>
          <p style="margin-top:8px;font-size:.82rem">Expected: assests/profiles.json and assests/photos/</p>
        </div>`;
    }
  }

  // ── Series Chips ──────────────────────────────────────────────────────────
  function buildSeriesChips() {
    const seriesSet = new Set();
    allProfiles.forEach(p => { const s = getSeries(p.ID); if (s) seriesSet.add(s); });
    const sorted = [...seriesSet].sort((a, b) => Number(b) - Number(a));
    const container = document.getElementById('seriesChips');
    container.querySelectorAll('.series-chip').forEach(chip => chip.remove());
    sorted.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'chip series-chip';
      btn.dataset.series = s;
      btn.textContent = `${s} Series`;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.series-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSeries = s; currentPage = 1; renderGrid();
      });
      container.appendChild(btn);
    });
  }

  function buildOrganizationChips() {
    const orgSet = new Set();
    allProfiles.forEach(p => {
      const org = String(p.Organization || '').trim();
      if (org) orgSet.add(org);
    });
    allOrganizations = [...orgSet].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
    renderOrganizationOptions('');
  }

  function renderOrganizationOptions(query) {
    const list = document.getElementById('organizationOptions');
    if (!list) return;
    const q = String(query || '').trim().toLowerCase();
    let filtered = !q ? [...allOrganizations] : allOrganizations.filter(org => org.toLowerCase().includes(q));
    if (activeOrganization !== 'all' && allOrganizations.includes(activeOrganization) && !filtered.includes(activeOrganization)) {
      filtered = [activeOrganization, ...filtered];
    }
    list.innerHTML = '';
    filtered.forEach(org => {
      const opt = document.createElement('option');
      opt.value = org;
      list.appendChild(opt);
    });
  }

  function normalizeOrganizationSelection(value) {
    const v = String(value || '').trim();
    if (!v || /^all organizations$/i.test(v)) return 'all';
    return allOrganizations.includes(v) ? v : 'all';
  }

  // ── Filter ────────────────────────────────────────────────────────────────
  function getFiltered() {
    const q = searchQuery.toLowerCase();
    return allProfiles.filter(p => {
      const s = getSeries(p.ID);
      const seriesOk = activeSeries === 'all' || s === activeSeries;
      const orgOk = activeOrganization === 'all' || String(p.Organization || '').trim() === activeOrganization;
      const bloodOk  = activeBlood  === 'all' || norm(p.Blood) === norm(activeBlood);
      const textOk   = !q || [p.Name,p.ID,p.Email,p.Mobile,p.Designation,p.Organization].some(v=>(v||'').toLowerCase().includes(q));
      return seriesOk && orgOk && bloodOk && textOk;
    });
  }
  const norm = b => (b||'').replace(/\s/g,'').toUpperCase();

  // ── Grid ──────────────────────────────────────────────────────────────────
  function renderGrid() {
    const filtered   = getFiltered();
    const total      = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;
    document.getElementById('countDisplay').textContent = total;
    const grid = document.getElementById('grid');

    if (!total) {
      grid.innerHTML = `<div class="no-results"><svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No members found.</p></div>`;
      document.getElementById('paginationWrap').innerHTML = '';
      return;
    }

    const start     = (currentPage - 1) * PER_PAGE;
    const pageItems = filtered.slice(start, start + PER_PAGE);

    grid.innerHTML = pageItems.map((p, i) => {
      const series = getSeries(p.ID);
      const batchNo = getBatchNumberFromSeries(series);
      const photoSrc = normalizePhotoPath(p.photo);
      const photoHtml = photoSrc
        ? `<img class="card-photo" src="${photoSrc}" alt="${esc(p.Name)}" loading="lazy" decoding="async" fetchpriority="low" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-photo-placeholder" style="display:none">👤</div>`
        : `<div class="card-photo-placeholder">👤</div>`;
      return `
        <div class="card" style="animation-delay:${(i%PER_PAGE)*0.025}s" onclick="openModal(${p._idx})">
          ${photoHtml}
          <div class="card-body">
            <div class="card-meta">
              <span class="badge badge-id">ID ${esc(p.ID||'—')}</span>
              ${series ? `<span class="badge badge-series">${formatSeriesHtml(series)}</span>` : ''}
              ${batchNo ? `<span class="badge badge-batch">${toOrdinalSupHtml(batchNo)} Batch</span>` : ''}
            </div>
            <div class="card-name">${esc(p.Name||'Unknown')}</div>
            <div class="card-role">${esc(p.Designation||'')}${p.Designation&&p.Organization?' · ':''}${esc(p.Organization||'')}</div>
            <div class="card-footer">
              <span class="blood-badge">${esc(p.Blood||'?')}</span>
              <span class="view-btn">View ID Card <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
            </div>
          </div>
        </div>`;
    }).join('');

    renderPagination(totalPages, total, start, Math.min(start + PER_PAGE, total));
  }

  // ── Pagination ────────────────────────────────────────────────────────────
  function renderPagination(totalPages, total, start, end) {
    const wrap = document.getElementById('paginationWrap');
    if (totalPages <= 1) { wrap.innerHTML = ''; return; }
    let html = `<div class="page-info">Showing ${start+1}–${end} of ${total} members</div>`;
    html += `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>`;
    getPageNums(currentPage, totalPages).forEach(pg => {
      if (pg === '...') html += `<span class="pg-ellipsis">…</span>`;
      else html += `<button class="pg-btn ${pg===currentPage?'active':''}" onclick="goPage(${pg})">${pg}</button>`;
    });
    html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>`;
    wrap.innerHTML = html;
  }

  function getPageNums(cur, total) {
    if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
    const p = [1];
    if (cur > 3) p.push('...');
    for (let i=Math.max(2,cur-1); i<=Math.min(total-1,cur+1); i++) p.push(i);
    if (cur < total-2) p.push('...');
    p.push(total);
    return p;
  }

  function goPage(n) {
    const tp = Math.ceil(getFiltered().length / PER_PAGE);
    if (n<1||n>tp) return;
    currentPage=n; renderGrid();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  // ── Open Modal / Populate ID Card ────────────────────────────────────────
  function openModal(index) {
    const p = allProfiles[index];
    if (!p) return;
    const series = getSeries(p.ID);
    const batchNo = getBatchNumberFromSeries(series);
    const batchCategory = getBatchCategory(batchNo);
    const photoSrc = normalizePhotoPath(p.photo);
    const designation = cleanDisplayValue(p.Designation);
    const organization = cleanDisplayValue(p.Organization);
    const mobile = cleanDisplayValue(p.Mobile);
    const email = cleanDisplayValue(p.Email);

    currentMemberName = (p.Name || 'member').replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_');

    // Photo
    const imgEl = document.getElementById('idCardPhoto');
    const phEl  = document.getElementById('idPhotoPlaceholder');
    if (photoSrc) {
      imgEl.src   = photoSrc;
      imgEl.style.display = 'block';
      phEl.style.display  = 'none';
    } else {
      imgEl.style.display = 'none';
      phEl.style.display  = 'flex';
    }

    document.getElementById('idName').textContent        = p.Name || 'Unknown';
    document.getElementById('idDesignation').textContent = designation;
    document.getElementById('idOrgName').textContent     = organization;

    document.getElementById('idBadges').innerHTML = `
      ${p.ID     ? `<span class="id-badge id-badge-id">ID ${esc(p.ID)}</span>` : ''}
      ${series   ? `<span class="id-badge id-badge-series">${formatSeriesHtml(series)}</span>` : ''}
      ${batchNo  ? `<span class="id-badge id-badge-batch">${toOrdinalSupHtml(batchNo)} Batch</span>` : ''}
      ${batchCategory ? `<span class="id-badge id-badge-status">${esc(batchCategory)}</span>` : ''}`;

    const detailRows = [
      `<div class="id-row"><div class="id-row-label">Student ID</div><div class="id-row-value">${esc(p.ID || '—')}</div></div>`,
      `<div class="id-row"><div class="id-row-label">Series / Batch</div><div class="id-row-value">${series ? formatSeriesHtml(series) : `<span class="empty">—</span>`}${batchNo ? ` · ${toOrdinalSupHtml(batchNo)} Batch` : ''}</div></div>`
    ];

    if (mobile) {
      detailRows.push(`<div class="id-row"><div class="id-row-label">Mobile</div><div class="id-row-value"><a href="${getTelHref(mobile)}" target="_self" rel="noopener noreferrer">${esc(mobile)}</a></div></div>`);
    }
    if (email) {
      detailRows.push(`<div class="id-row"><div class="id-row-label">Email</div><div class="id-row-value"><a href="${getMailHref(email)}" target="_self" rel="noopener noreferrer">${esc(email)}</a></div></div>`);
    }
    if (organization) {
      detailRows.push(`<div class="id-row"><div class="id-row-label">Organization</div><div class="id-row-value">${esc(organization)}</div></div>`);
    }

    document.getElementById('idDetails').innerHTML = detailRows.join('');
    document.getElementById('idSeriesMark').textContent = batchNo ? `Batch ${toOrdinal(batchNo)}` : '';

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Reset download button state
    const dlBtn = document.getElementById('downloadBtn');
    dlBtn.classList.remove('loading');
    dlBtn.disabled = false;
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Download ID Card ──────────────────────────────────────────────────────
  async function downloadCard() {
    const dlBtn = document.getElementById('downloadBtn');
    const card  = document.getElementById('idCard');
    if (dlBtn.disabled) return;

    dlBtn.classList.add('loading');
    dlBtn.disabled = true;

    try {
      const domToImage = await ensureDomToImage();
      const scale = 2.5;
      const w = card.offsetWidth * scale;
      const h = card.offsetHeight * scale;
      const radius = 22 * scale;

      const style = {
        transform: `scale(${scale})`,
        transformOrigin: 'top left',
        width: card.offsetWidth + 'px',
        height: card.offsetHeight + 'px',
      };

      const dataUrl = await domToImage.toPng(card, {
        width: w,
        height: h,
        style,
        quality: 1,
        bgcolor: '#08142f',
      });

      // Draw onto canvas with rounded clip so border-radius is preserved
      const img = new Image();
      img.src = dataUrl;
      await new Promise(res => img.onload = res);

      const cvs = document.createElement('canvas');
      cvs.width = w;
      cvs.height = h;
      const ctx = cvs.getContext('2d');

      // Perfect rounded corners using arc()
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(w - radius, 0);
      ctx.arc(w - radius, radius, radius, -Math.PI / 2, 0);
      ctx.lineTo(w, h - radius);
      ctx.arc(w - radius, h - radius, radius, 0, Math.PI / 2);
      ctx.lineTo(radius, h);
      ctx.arc(radius, h - radius, radius, Math.PI / 2, Math.PI);
      ctx.lineTo(0, radius);
      ctx.arc(radius, radius, radius, Math.PI, -Math.PI / 2);
      ctx.closePath();
      ctx.clip();

      ctx.fillStyle = '#08142f';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0);

      const link = document.createElement('a');
      link.download = `DUET_Reunion_2025_${currentMemberName || 'ID_Card'}.png`;
      link.href = cvs.toDataURL('image/png');
      link.click();
    } catch (err) {
      console.error('Download failed:', err);
      alert('Could not generate image. Try again or take a screenshot.');
    } finally {
      dlBtn.classList.remove('loading');
      dlBtn.disabled = false;
    }
  }

  // ── Events ────────────────────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', e => {
    const nextQuery = e.target.value;
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      searchQuery = nextQuery;
      currentPage = 1;
      renderGrid();
    }, SEARCH_DEBOUNCE_MS);
  });

  document.querySelectorAll('[data-blood]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-blood]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeBlood=btn.dataset.blood; currentPage=1; renderGrid();
    });
  });

  document.querySelector('[data-series="all"]').addEventListener('click', () => {
    document.querySelectorAll('.series-chip').forEach(b=>b.classList.remove('active'));
    document.querySelector('[data-series="all"]').classList.add('active');
    activeSeries='all'; currentPage=1; renderGrid();
  });

  document.getElementById('organizationSelect').addEventListener('change', e => {
    activeOrganization = normalizeOrganizationSelection(e.target.value);
    if (activeOrganization === 'all') e.target.value = '';
    currentPage = 1;
    renderGrid();
  });

  document.getElementById('organizationSelect').addEventListener('input', e => {
    renderOrganizationOptions(e.target.value);
  });

  document.getElementById('downloadBtn').addEventListener('click', downloadCard);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===document.getElementById('modalOverlay')) closeModal(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

  loadData();
</script>
